{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} FormField | NexusForms{% endblock %}
{% block page_title %}{% if editing %}Edit FormField{% else %}New FormField{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Form Title</label>
        <input type="text" name="form_title" value="{{ record.form_title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Label</label>
        <input type="text" name="label" value="{{ record.label|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Field Type</label>
        <select name="field_type">
          <option value="text" {% if record.field_type == 'text' %}selected{% endif %}>Text</option>
          <option value="email" {% if record.field_type == 'email' %}selected{% endif %}>Email</option>
          <option value="number" {% if record.field_type == 'number' %}selected{% endif %}>Number</option>
          <option value="date" {% if record.field_type == 'date' %}selected{% endif %}>Date</option>
          <option value="select" {% if record.field_type == 'select' %}selected{% endif %}>Select</option>
          <option value="checkbox" {% if record.field_type == 'checkbox' %}selected{% endif %}>Checkbox</option>
          <option value="file" {% if record.field_type == 'file' %}selected{% endif %}>File</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" name="required" id="id_required" {% if record.required %}checked{% endif %}>
        <label for="id_required" style="margin-bottom:0">Required</label>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Position</label>
        <input type="number" name="position" value="{{ record.position|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Placeholder</label>
        <input type="text" name="placeholder" value="{{ record.placeholder|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} FormField</button>
      <a href="/formfields/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
