{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Submission | NexusForms{% endblock %}
{% block page_title %}{% if editing %}Edit Submission{% else %}New Submission{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Form Title</label>
        <input type="text" name="form_title" value="{{ record.form_title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Respondent Email</label>
        <input type="email" name="respondent_email" value="{{ record.respondent_email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Submitted Date</label>
        <input type="date" name="submitted_date" value="{{ record.submitted_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Ip Address</label>
        <input type="text" name="ip_address" value="{{ record.ip_address|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Data Preview</label>
      <textarea name="data_preview">{{ record.data_preview|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="new" {% if record.status == 'new' %}selected{% endif %}>New</option>
          <option value="reviewed" {% if record.status == 'reviewed' %}selected{% endif %}>Reviewed</option>
          <option value="archived" {% if record.status == 'archived' %}selected{% endif %}>Archived</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Submission</button>
      <a href="/submissions/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
